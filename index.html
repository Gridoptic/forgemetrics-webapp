<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0d18">
    <title>ForgeMetrics</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="app">

    <div id="loading-screen" class="screen screen-loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Загружаем твой кабинет...</div>
    </div>

    <div id="error-screen" class="screen screen-error" style="display: none;">
        <div class="error-icon">
            <i class="ti ti-alert-triangle"></i>
        </div>
        <div class="error-title">Что-то пошло не так</div>
        <div class="error-message" id="error-message">Не удалось загрузить данные</div>
        <button class="btn-primary" onclick="location.reload()">Попробовать снова</button>
    </div>

    <div id="dashboard-screen" class="screen" style="display: none;">

        <header class="header">
            <button class="header-btn header-btn-menu" id="menu-btn">
                <i class="ti ti-menu-2"></i>
                <span class="header-btn-dot" id="menu-dot"></span>
            </button>
            <div class="header-title">ForgeMetrics</div>
            <button class="header-btn header-btn-avatar" id="profile-btn">
                <span id="avatar-letter">K</span>
            </button>
        </header>

        <div class="greeting">
            <div class="greeting-name" id="greeting-name">Привет</div>
            <div class="greeting-meta" id="greeting-meta">
                <i class="ti ti-brand-telegram"></i>
                <span id="channel-info">Подключи канал чтобы видеть метрики</span>
            </div>
        </div>

        <div class="metrics" id="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">
                    <i class="ti ti-eye"></i>
                    Просмотры
                </div>
                <div class="metric-value">
                    <span class="metric-number" id="metric-views">—</span>
                    <span class="metric-trend" id="metric-views-trend"></span>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-label">
                    <i class="ti ti-users"></i>
                    Подписчики
                </div>
                <div class="metric-value">
                    <span class="metric-number" id="metric-subs">—</span>
                    <span class="metric-trend" id="metric-subs-trend"></span>
                </div>
            </div>
        </div>

        <div class="section-label">Что делаем сейчас?</div>

        <div class="actions" id="actions-list">
        </div>

    </div>

    <div id="drawer-overlay" class="drawer-overlay"></div>

    <aside id="drawer" class="drawer">
        <div class="drawer-header">
            <div class="drawer-title">Меню</div>
            <button class="drawer-close" id="drawer-close">
                <i class="ti ti-x"></i>
            </button>
        </div>

        <div class="drawer-section">
            <div class="drawer-section-label">Контент</div>
            <button class="drawer-item" data-action="create_post">
                <div class="drawer-item-icon icon-purple">
                    <i class="ti ti-sparkles"></i>
                </div>
                <div class="drawer-item-text">Создать пост</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
            <button class="drawer-item" data-action="rewrite_post">
                <div class="drawer-item-icon icon-purple">
                    <i class="ti ti-pencil"></i>
                </div>
                <div class="drawer-item-text">Рерайт чужого поста</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
            <button class="drawer-item" data-action="content_plan">
                <div class="drawer-item-icon icon-purple">
                    <i class="ti ti-calendar"></i>
                </div>
                <div class="drawer-item-text">Контент-план</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
        </div>

        <div class="drawer-section">
            <div class="drawer-section-label">Аналитика</div>
            <button class="drawer-item" data-action="channel_analytics">
                <div class="drawer-item-icon icon-blue">
                    <i class="ti ti-chart-line"></i>
                </div>
                <div class="drawer-item-text">Метрики канала</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
            <button class="drawer-item" data-action="ai_audit">
                <div class="drawer-item-icon icon-blue">
                    <i class="ti ti-target"></i>
                </div>
                <div class="drawer-item-text">AI-аудит канала</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
            <button class="drawer-item" data-action="competitor_analysis">
                <div class="drawer-item-icon icon-blue">
                    <i class="ti ti-search"></i>
                </div>
                <div class="drawer-item-text">Анализ конкурентов</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
        </div>

        <div class="drawer-section">
            <div class="drawer-section-label">Деньги</div>
            <button class="drawer-item" data-action="find_advertisers">
                <div class="drawer-item-icon icon-green">
                    <i class="ti ti-coin"></i>
                </div>
                <div class="drawer-item-text">Найти рекламодателей</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
            <button class="drawer-item" data-action="post_price">
                <div class="drawer-item-icon icon-green">
                    <i class="ti ti-calculator"></i>
                </div>
                <div class="drawer-item-text">Цена поста</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
            <button class="drawer-item" data-action="negotiation_templates">
                <div class="drawer-item-icon icon-green">
                    <i class="ti ti-message-circle"></i>
                </div>
                <div class="drawer-item-text">Шаблоны переговоров</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
        </div>

        <div class="drawer-divider"></div>

        <div class="drawer-section">
            <button class="drawer-item" data-action="referral">
                <div class="drawer-item-icon icon-pink">
                    <i class="ti ti-heart-handshake"></i>
                </div>
                <div class="drawer-item-text">Друзья и промокод</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
            <button class="drawer-item" data-action="profile">
                <div class="drawer-item-icon icon-amber">
                    <i class="ti ti-user-circle"></i>
                </div>
                <div class="drawer-item-text">Тариф и подписка</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
            <button class="drawer-item" data-action="voice_settings">
                <div class="drawer-item-icon icon-amber">
                    <i class="ti ti-microphone"></i>
                </div>
                <div class="drawer-item-text">Голос канала</div>
                <i class="ti ti-chevron-right drawer-item-chevron"></i>
            </button>
        </div>

    </aside>

    <div id="placeholder-screen" class="screen screen-placeholder" style="display: none;">
        <button class="placeholder-back" id="placeholder-back">
            <i class="ti ti-arrow-left"></i>
        </button>
        <div class="placeholder-content">
            <div class="placeholder-icon" id="placeholder-icon">
                <i class="ti ti-rocket"></i>
            </div>
            <div class="placeholder-title" id="placeholder-title">Скоро будет готово</div>
            <div class="placeholder-text" id="placeholder-text">
                Эта функция уже в разработке.
                Мы скоро её запустим.
            </div>
        </div>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
